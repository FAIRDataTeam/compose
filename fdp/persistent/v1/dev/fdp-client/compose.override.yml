# note docker compose automatically loads compose.yml *and* compose.override.yml (if present)
services:
  fdp:
    environment:
      # if we run the fdp at port 8080, the fdp-client will automatically listen
      # on port 8081 (when using `npm run serve`, which calls vue-cli-service)
      INSTANCE_CLIENTURL: http://localhost:8081
      INSTANCE_PERSISTENTURL: http://localhost:8081
      # configure fdp to use graphdb instead of the in-memory triple store
      REPOSITORY_TYPE: 4
      REPOSITORY_GRAPHDB_URL: http://graphdb:7200
      REPOSITORY_GRAPHDB_REPOSITORY: fdp
    depends_on:
      # depend on initialized graphdb (in addition to mongo)
      graphdb-init:
        condition: service_completed_successfully
    # expose fdp on host, because fdp-client running from source has no access to the docker network
    ports:
      - "127.0.0.1:8080:8080"
  # use docker managed volumes for data persistence
  graphdb:
    volumes:
      - graphdbdata:/opt/graphdb/home
  graphdb-init:
    environment:
      # space-separated list of repo names
      REPO_NAMES: fdp
  mongo:
    volumes:
      - mongodbdata:/data/db

volumes:
  graphdbdata:
  mongodbdata:
