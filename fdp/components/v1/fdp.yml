services:
  fdp:
    image: "fairdata/fairdatapoint:${FDP_VERSION:-1.20.3}"
    restart: no
    environment:
      SERVER_PORT: 8080
      INSTANCE_CLIENTURL: http://localhost
      INSTANCE_PERSISTENTURL: http://localhost
      # enable /actuator/metrics endpoint (in addition to health and info endpoints)
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health, info, metrics
      # disable ping
      PING_ENABLED: false
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: wget --quiet --spider http://127.0.0.1:8080 || exit 1
      start_interval: 3s
      start_period: 30s
